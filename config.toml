  sidebarAbout = [
    "我是 Roald Clark，一名致力于推广自由软件运动的艺术与设计学习（自修）生。",
    "这里算是对自己失败人生的一点交代。"
  ]
  # Contact page
     # Since this template is static, the contact form uses www.formspree.io as a
